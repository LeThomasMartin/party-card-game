<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The crazy party game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>

<body>
    <h1>The crazy party game</h1>
    <h4>Welcome to the crazy party game!</h4>
    <main>
        <form class="form">
            <div class="player-controls">
                <label for="player-name">Your Name:</label>
                <input type="text" id="player-name" name="player-name" required placeholder="Enter your name" maxlength="11">
                <label for="lobby-id">Lobby ID:</label>
                <input type="text" id="lobby-id" name="lobby-id" placeholder="Enter lobby ID">
            </div>

            <div class="lobby-controls">
                <button type="button" id="create-lobby">Create Lobby</button>
                <button type="button" id="join-lobby">Join Lobby</button>
            </div>
        </form>
    </main>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/server.js') }}"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>
</html>
