<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The crazy party game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>

<body>
    <h1>The crazy party game</h1>
    <h4>Welcome to the crazy party game!</h4>
    <main>
        <form class="form">
            <div class="player-controls">
                <label for="amountplayers">Number of Players:</label>
                <div class="player-controls-inputs">
                    <button type="button" id="decrease-players">−</button>
                    <input type="number" id="amountplayers" name="players" required placeholder="Enter a number" max="10" min="1">
                    <button type="button" id="increase-players">+</button>
                </div>
            </div>

            <div class="player-names" id="players-names">
            </div>

            <form action="{{ url_for('gamePage') }}" method="GET">
                <button type="submit">Start Playing</button>
            </form>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}"></script>
</body>
</html>
